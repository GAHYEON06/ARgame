<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>고대 안암 보물찾기 AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      .overlay {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: cyan; padding: 15px;
        border-radius: 8px; z-index: 1000; font-family: 'Malgun Gothic', sans-serif;
        text-align: center; min-width: 250px;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div class="overlay" id="status-panel">보물 좌표로 이동하세요...</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-entity
        id="outdoor-point"
        gps-entity-place="latitude: 37.591570; longitude: 127.022455;"
        gltf-model="url(https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb)"
        scale="15 15 15"
      ></a-entity>

      <a-nft
        type="nft"
        url="https://your-server.com/nft/target-image" 
        smooth="true">
        <a-entity
          gltf-model="url(https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF-Binary/Box.glb)"
          scale="100 100 100"
          position="0 0 0"
        ></a-entity>
      </a-nft>

      <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
      const statusPanel = document.getElementById('status-panel');
      
      window.addEventListener('gps-camera-update-position', (e) => {
        // 야외 포인트와의 거리 계산
        const outdoor = document.getElementById('outdoor-point');
        const dist = outdoor.getAttribute('distanceMsg');
        
        if (dist && parseFloat(dist) < 20) {
          statusPanel.innerHTML = "📍 근처에 도착했습니다!<br>건물 안의 <b>[보물지도 포스터]</b>를 비추세요!";
          statusPanel.style.color = "#FFD700";
        } else if (dist) {
          statusPanel.innerText = `보물 지점까지 ${dist}m 남음`;
        }
      });
    </script>
  </body>
</html>
