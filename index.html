<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>AR Treasure Hunt - Anam</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      .ui-panel {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7); color: white; padding: 15px;
        border-radius: 10px; font-family: sans-serif; text-align: center; z-index: 999;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div class="ui-panel">
      <div id="distance-display">장소로 이동 중...</div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-entity
        id="treasure"
        gltf-model="url(https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb)"
        gps-entity-place="latitude: 37.592257; longitude: 127.021151;"
        scale="15 15 15"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
      >
      </a-entity>

      <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
      const distanceDisplay = document.getElementById('distance-display');

      window.addEventListener('gps-camera-update-position', (e) => {
        const treasure = document.getElementById('treasure');
        // 거리 확인 (모델과의 거리 계산)
        const distance = treasure.getAttribute('distanceMsg');
        
        if (distance) {
            distanceDisplay.innerText = `보물까지 거리: ${distance}`;
            // 15미터 이내로 들어오면 색다른 알림을 줄 수 있습니다.
            if (parseFloat(distance) < 15) {
                distanceDisplay.innerText = "🎉 보물 근처에 도착했습니다! 주변을 비춰보세요!";
                distanceDisplay.style.background = "rgba(255, 0, 0, 0.8)";
            }
        }
      });
    </script>
  </body>
</html>
